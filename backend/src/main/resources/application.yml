server:
  port: ${PORT:8080}

spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      data-source-properties:
        allowPublicKeyRetrieval: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  flyway:
    enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  ai:
    output-format: ${AI_OUTPUT_FORMAT:json_object}
    prompt-file: ${AI_PROMPT_FILE:classpath:prompts/wizard.md}
    max-history: ${AI_MAX_HISTORY:16}
    temperature: ${AI_TEMPERATURE:0.2}
  chat:
    prompt-file: ${CHAT_PROMPT_FILE:classpath:prompts/chat_assistant.md}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-minutes: ${JWT_EXP_MINUTES:480}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
